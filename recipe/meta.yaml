{% set name = "aiida-shell" %}
{% set version = "0.8.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aiida_shell-{{ version }}.tar.gz
  sha256: 50d7cd30d266531a7787e3d35ffca0e2e0c95a51bcb3b944fb9ac3f047937422

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.4,<4
    - pip
  run:
    - python >={{ python_min }}
    - aiida-core >=2.6,<3.dev0,>=2.6.1
    - dill

test:
  imports:
    - aiida_shell
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://aiida.net
  summary: AiiDA plugin that makes running shell commands easy.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - sphuber
    - jan-janssen
